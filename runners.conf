# Ralph loop runner chain — tried top-down each iteration. A runner that
# emits no bare <promise> tag (crash, usage limit) rotates to the next line;
# RALPH_RUNNER still overrides this file for a single-runner run.
# Codex pool 1: ChatGPT subscription gmdqn2tp (default CODEX_HOME)
codex exec --sandbox workspace-write -c sandbox_workspace_write.network_access=true -c model_reasoning_effort=medium -c 'sandbox_workspace_write.writable_roots=["'"$PWD"'/.git"]' -
# Codex pool 2: ChatGPT subscription umjitak — one-time setup: CODEX_HOME=$HOME/.codex-umjitak codex login
CODEX_HOME=$HOME/.codex-umjitak codex exec --sandbox workspace-write -c sandbox_workspace_write.network_access=true -c model_reasoning_effort=medium -c 'sandbox_workspace_write.writable_roots=["'"$PWD"'/.git"]' -
# Claude subscription (mid-chain backup; primary pool is reserved for interactive supervision)
claude -p
# Claude at a lower burn rate
claude -p --model sonnet
# Last resort: metered OpenAI API billing (CODEX_HOME pre-authenticated with the API key)
CODEX_HOME=$HOME/.codex-apikey codex exec --sandbox workspace-write -c sandbox_workspace_write.network_access=true -c model_reasoning_effort=medium -c 'sandbox_workspace_write.writable_roots=["'"$PWD"'/.git"]' -
