id: "NEXT-1"
from_criticism: "G1"
target_claim: "C4"
hypothesis: "A bounded experiment can resolve whether the paper's evidence supports C4: Decomposing reviews into evidence tiers helps authors trace the basis of criticisms and increases the precision of next-experiment selection."
baseline: "Use the closest reported evidence sentence as the baseline before running the missing check."
metric: "claim-specific pass rate"
keep_condition: "claim-specific pass rate passes on a held-out fixture and the evidence can be reproduced from saved artifacts."
discard_condition: "claim-specific pass rate fails on the held-out fixture or requires evidence not present in the paper artifacts."
verify: "Run the smallest saved fixture that directly targets C4 and attach the run artifact."
