id: "NEXT-1"
from_criticism: "G1"
target_claim: "C1"
hypothesis: "A bounded experiment can resolve whether the paper's evidence supports C1: Tool-using language agents waste a large share of their token budget on\nretries after transient tool failures. We propose an adaptive retry budget\nthat reallocates retry tokens from stable tools to flaky tools at runtime.\nOn our internal harness the adaptive budget reduces wasted retry tokens by\n41% compared with a fixed three-retry policy, while task success stays at\n23 out of 25 fixtures. We believe the same controller could transfer to\nmulti-agent settings, although no multi-agent run has been executed yet."
baseline: "Use the closest reported evidence sentence as the baseline before running the missing check."
metric: "cross-paper transfer pass rate"
keep_condition: "cross-paper transfer pass rate reaches the stated target 41% without introducing a new contradiction."
discard_condition: "cross-paper transfer pass rate remains below 41% or the run cannot be reproduced."
verify: "Run the smallest saved fixture that directly targets C1 and attach the run artifact."
